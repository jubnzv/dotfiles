[colors]
orange = #ff6200
white = #ebdbb2
gray = #585858
black = #090909
red1 = #cc241d
red2 = #fb4934
blue1 = #458588
blue2 = #83a598
purple1 = #b16286
purple2 = #d3869b
yellow1 = #d79921
yellow2 = #fabd2f
aqua1 = #689d6a
aqua2 = #8ec07c
fg4 = #a89984
background = #262626
background-alt = #4e4e4e
foreground = #ebdbb2
foreground-alt = #4e4e4e
primary = #1f222d
secondary = #ff6200
alert = #fb4934

[bar/example]
monitor = ${env:MONITOR:eDP-1}
width = 100%
height = 25
radius = 0
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 1
line-color = ${colors.red2}
border-size = 0
border-color = #00000000

padding-left = 0
padding-right = 2

module-margin-left = 1
module-margin-right = 2

font-0 = FontAwesome:style=Regular:pixelsize=8
font-1 = Iosevka Nerd Font:style=Regular:size=10

modules-left = i3
modules-center = date cet-time
modules-right = pulseaudio microphone xbacklight notifications-status filesystem-root wlan eth vpn-openvpn-isrunning mouse-battery battery

scroll-up = i3wm-wsnext
scroll-down = i3wm-wsprev

cursor-click = pointer
cursor-scroll = ns-resize

tray-position = right
tray-padding = 2
tray-background = ${colors.background}
tray-scale = 1.0
tray-maxsize = 21

dpi-x = 140
dpi-y = 140

[module/filesystem-root]
type = internal/fs
interval = 30
mount-0 = /
warn-percentage=90

format-mounted-prefix-foreground = ${colors.foreground-alt}
format-mounted-prefix-underline = ${colors.purple1}
format-mounted-prefix = "’éĀ "

; label-mounted = %percentage_used%%
label-mounted =
label-mounted-underline = ${colors.purple1}
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.foreground-alt}

format-warn = <label-warn>
format-warn-prefix = "’éĀ "
format-warn-foreground = ${colors.yellow1}
label-warn = %percentage_used%%

[module/i3]
type = internal/i3

format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

; Only show workspaces on the same output as the bar
pin-workspaces = true

fuzzy-match = false
strip-wsnumbers = true

; Colors for binging mode texts
label-mode-padding = 2
label-mode-foreground = ${colors.foreground}
label-mode-background = ${colors.background}

; focused = Active workspace on focused monitor
label-focused = %icon%
label-focused-background = ${colors.fg4}
label-focused-foreground = ${colors.background}
label-focused-underline= ${colors.fg4}
label-focused-padding = 2

; unfocused = Inactive workspace on any monitor
label-unfocused = %icon%
label-unfocused-foreground = ${colors.background-alt}
label-unfocused-padding = 2

; visible = Active workspace on unfocused monitor
label-visible = %icon%
label-visible-background = ${self.label-focused-background}
label-visible-underline = ${self.label-focused-underline}
label-visible-foreground = ${colors.background-alt}
label-visible-padding = ${self.label-focused-padding}

; urgent = Workspace with urgency hint set
label-urgent = %icon%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background-alt}
label-urgent-padding = 2

; Generate ws-icon list:
; counter=0
; i3-msg -t get_workspaces | tr ',' '\n' | sed -nr 's/"name":"([^"]+)"/\1/p' | while read -r name; do
; printf 'ws-icon-%i = "%s;<insert-icon-here>"\n' $((counter++)) $name
; done
ws-icon-0  = 1:q;’äĪ
ws-icon-1  = 2:w;’é¼
ws-icon-2  = 3:e;’äĀ
ws-icon-3  = 4:f;’ģø
ws-icon-4  = 5:j;j
ws-icon-5  = 6:i;i
ws-icon-6  = 7:o;o
ws-icon-7  = 8:p;p
ws-icon-8 = 9:a;’Ćģ
ws-icon-9 = "10:0;’āĀ"

[module/xbacklight]
type = internal/xbacklight

format = <label> <bar>
label = "’ā½ "
bar-width = 7
bar-indicator = |
bar-indicator-foreground = #fff
bar-indicator-font = 2
bar-fill = ŌöĆ
bar-fill-font = 2
bar-fill-foreground = #9f78e1
bar-empty = ŌöĆ
bar-empty-font = 2
bar-empty-foreground = ${colors.foreground-alt}

[module/backlight-acpi]
inherit = module/xbacklight
type = internal/backlight
card = intel_backlight

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "’ŗø "
format-prefix-foreground = ${colors.foreground-alt}
format-underline = ${colors.red2}
label =
; label = %percentage:2%%

format-warn = <label-warn>
format-warn-prefix = "’ŗø "
format-warn-foreground = ${colors.yellow1}
label-warn = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "’ćĆ "
format-prefix-foreground = ${colors.foreground-alt}
format-underline = ${colors.aqua1}
; label = %percentage_used%%
label =

format-warn = <label-warn>
format-warn-prefix = "’ćĆ "
format-warn-foreground = ${colors.yellow1}
label-warn = " %percentage_used%%

[module/wlan]
type = internal/network
interface = wlp0s20f3
interval = 3.0
format-connected = <ramp-signal> <label-connected>
format-connected-underline = ${colors.blue2}
label-connected = %essid%
format-disconnected =
ramp-signal-0 = ’ć½
ramp-signal-1 = ’ć½
ramp-signal-2 = ’ć½
ramp-signal-3 = ’ć½
ramp-signal-4 = ’ć½
ramp-signal-foreground = ${colors.foreground-alt}

[module/eth]
type = internal/network
interface = enx606d3cbaac9f
interval = 3.0
format-connected-underline = ${colors.aqua2}
format-connected-prefix = "’ø┐ "
format-connected-prefix-foreground = ${colors.foreground-alt}
label-connected = %local_ip%
format-disconnected =

[module/date]
type = internal/date
interval = 5
date =
date-alt = " %Y-%m-%d"
time = %A, %d %B %H:%M
time-alt = %H:%M:%S
format-prefix =
format-prefix-foreground = ${colors.foreground-alt}
label = %date% %time%

[module/cet-time]
type = custom/script
exec = TZ=CET date +"|   %H:%M"
interval = 5

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "’Ć© "
format-volume-prefix-foreground = ${colors.foreground-alt}
format-volume = <label-volume> <bar-volume>
label-volume = %percentage%%
label-volume-foreground = ${root.foreground}
label-muted = muted
label-muted-foreground = ${colors.gray}
bar-volume-width = 7
bar-volume-foreground-0 = ${colors.aqua1}
bar-volume-foreground-1 = ${colors.aqua1}
bar-volume-foreground-2 = ${colors.aqua1}
bar-volume-foreground-3 = ${colors.aqua1}
bar-volume-foreground-4 = ${colors.yellow2}
bar-volume-foreground-5 = ${colors.yellow2}
bar-volume-foreground-6 = ${colors.red1}
bar-volume-gradient = false
bar-volume-indicator = |
bar-volume-indicator-font = 2
bar-volume-fill = ŌöĆ
bar-volume-fill-font = 2
bar-volume-empty = ŌöĆ
bar-volume-empty-font = 2
bar-volume-empty-foreground = ${colors.foreground-alt}
click-right = pavucontrol

[module/microphone]
type = custom/script
exec = ~/.config/polybar/mic.sh tail 5
click-left = ~/.config/polybar/mic.sh toggle; ~/.config/polybar/mic.sh update %pid%
click-right = ~/.config/polybar/mic.sh toggle; ~/.config/polybar/mic.sh update %pid%
tail = true

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 97
low-at = 5
format-charging = <animation-charging> <label-charging>
format-charging-underline = ${colors.yellow1}
format-discharging = <animation-discharging> <label-discharging>
format-discharging-underline = ${self.format-charging-underline}
format-low = <animation-low> <label-low>
format-low-underline = ${colors.red1}
format-low-foreground = ${colors.red1}
format-full-prefix = ’ēĆ
format-full-prefix-foreground = ${colors.foreground-alt}
format-full-underline = ${self.format-charging-underline}
label-low = ’ēä %percentage%%
ramp-capacity-0 = ’ēā
ramp-capacity-1 = ’ēé
ramp-capacity-2 = ’ēü
ramp-capacity-foreground = ${colors.foreground-alt}
animation-charging-0 = ’ēā
animation-charging-1 = ’ēé
animation-charging-2 = ’ēü
animation-charging-foreground = ${colors.foreground-alt}
animation-charging-framerate = 2000
animation-discharging-0 = ’ēü
animation-discharging-1 = ’ēé
animation-discharging-2 = ’ēā
animation-discharging-foreground = ${colors.foreground-alt}
animation-discharging-framerate = 2000
animation-low-0 = ’ü¬
animation-low-1 = ’ü▒
animation-low-framerate = 500

[module/mouse-battery]
type = custom/script
exec = ~/.config/polybar/mouse-battery.sh
interval = 30
label = ’ēģ
format-background = ${colors.alert}

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 60
format = <ramp> <label>
format-underline = ${colors.purple2}
format-warn = <ramp> <label-warn>
format-warn-underline = ${self.format-underline}
label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.secondary}
ramp-0 = "’ŗŗ "
ramp-1 = "’ŗē "
ramp-2 = "’ŗł "
ramp-foreground = ${colors.foreground-alt}

[module/vpn-openvpn-isrunning]
type = custom/script
exec = ~/.config/polybar/vpn-openvpn-isrunning.sh tail 5
click-left = ~/.config/polybar/vpn-openvpn-isrunning.sh get_ip
tail = true

[module/notifications-status]
type = custom/script
exec = ~/.config/polybar/notifications-status.sh
interval = 5
format-foreground = ${colors.orange}
format-underline = ${colors.orange}

[module/docker]
type = custom/script
exec = if [ $(systemctl show --property ActiveState docker | egrep '=active') ]; then echo $(docker ps -q | wc -l); fi
interval = 1
label = ’åć %output%
format-underline = ${colors.gray}

[settings]
screenchange-reload = true
; compositing-background = xor
; compositing-background = screen
; compositing-foreground = source
; compositing-border = over
pseudo-transparency = false

[global/wm]
margin-top = 5
margin-bottom = 5

; vim:ft=dosini
