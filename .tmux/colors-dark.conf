# COLORSCHEME: gruvbox dark (matching i3 dark colors)
# bg0=#282828 bg1=#3c3836 bg2=#504945 bg3=#665c54 bg4=#7c6f64
# fg0=#fbf1c7 fg1=#ebdbb2 fg2=#d5c4a1 fg3=#bdae93 fg4=#a89984

# default statusbar colors
set-option -g status-bg "#3c3836"
set-option -g status-fg "#ebdbb2"

set -g window-status-style bg="#3c3836",fg="#a89984"
set -g window-status-activity-style bg="#3c3836",fg="#d65d0e"
set -g window-status-current-style bg="#3c3836",fg="#ebdbb2"
set -g pane-active-border-style fg="#4e4e4e"
set -g pane-border-style fg="#3c3836"
set -g message-style bg="#504945",fg="#ebdbb2"
set -g message-command-style bg="#504945",fg="#ebdbb2"

set -g display-panes-active-colour "#a89984"
set -g display-panes-colour "#3c3836"

# clock
set-window-option -g clock-mode-colour "#83a598"

# bell
set-window-option -g window-status-bell-style fg="#282828",bg="#fb4934"

# Status bar
set-option -g status-left "#[fg=#a89984, bg=#3c3836, nobold, noitalics, nounderscore]"
set-window-option -g window-status-current-format "#[fg=#3c3836, bg=#a89984, nobold, noitalics, nounderscore]#[fg=#282828, bg=#a89984] #I #[fg=#282828, bg=#a89984, bold] #{?window_zoomed_flag,[Z] ,}#W #[fg=#a89984, bg=#3c3836, nobold, noitalics, nounderscore]"
set-window-option -g window-status-format "#[fg=#3c3836,bg=#504945,noitalics]#[fg=#bdae93,bg=#504945] #I #[fg=#bdae93, bg=#504945] #{?window_zoomed_flag,Z ,}#W #[fg=#504945, bg=#3c3836, noitalics]"
