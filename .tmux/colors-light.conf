# COLORSCHEME: gruvbox light (matching i3 light colors)
# bg0=#fbf1c7 bg1=#ebdbb2 bg2=#d5c4a1 bg3=#bdae93 bg4=#a89984
# fg0=#1d2021 fg1=#3c3836 fg2=#504945 fg3=#665c54 fg4=#7c6f64

# default statusbar colors
set-option -g status-bg "#ebdbb2"
set-option -g status-fg "#1d2021"

set -g window-status-style bg="#ebdbb2",fg="#665c54"
set -g window-status-activity-style bg="#ebdbb2",fg="#af3a03"
set -g window-status-current-style bg="#ebdbb2",fg="#1d2021"
set -g pane-active-border-style fg="#665c54"
set -g pane-border-style fg="#d5c4a1"
set -g message-style bg="#d5c4a1",fg="#1d2021"
set -g message-command-style bg="#d5c4a1",fg="#1d2021"

set -g display-panes-active-colour "#665c54"
set -g display-panes-colour "#ebdbb2"

# clock
set-window-option -g clock-mode-colour "#076678"

# bell
set-window-option -g window-status-bell-style fg="#fbf1c7",bg="#9d0006"

# Status bar
set-option -g status-left "#[fg=#7c6f64, bg=#ebdbb2, nobold, noitalics, nounderscore]"
set-window-option -g window-status-current-format "#[fg=#ebdbb2, bg=#665c54, nobold, noitalics, nounderscore]#[fg=#fbf1c7, bg=#665c54] #I #[fg=#fbf1c7, bg=#665c54, bold] #{?window_zoomed_flag,[Z] ,}#W #[fg=#665c54, bg=#ebdbb2, nobold, noitalics, nounderscore]"
set-window-option -g window-status-format "#[fg=#ebdbb2,bg=#d5c4a1,noitalics]#[fg=#504945,bg=#d5c4a1] #I #[fg=#504945, bg=#d5c4a1] #{?window_zoomed_flag,Z ,}#W #[fg=#d5c4a1, bg=#ebdbb2, noitalics]"
